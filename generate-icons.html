<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body style="background:#333;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
  <h2>Right-click each icon and "Save Image As"</h2>
  <p>Save as <code>icons/icon-192.png</code> and <code>icons/icon-512.png</code></p>
  <br>
  <canvas id="c192" width="192" height="192" style="border:1px solid #666"></canvas>
  <canvas id="c512" width="512" height="512" style="border:1px solid #666"></canvas>
  <script>
    function drawIcon(canvas) {
      const s = canvas.width;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, s, s);
      const r = s * 0.15;
      ctx.beginPath();
      ctx.roundRect(0, 0, s, s, r);
      ctx.clip();
      ctx.fillRect(0, 0, s, s);
      ctx.fillStyle = '#f0a500';
      ctx.font = `bold ${s * 0.35}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('⭐', s / 2, s * 0.45);
      ctx.fillStyle = '#ffffff';
      ctx.font = `900 ${s * 0.1}px sans-serif`;
      ctx.fillText('MISSION', s / 2, s * 0.68);
      ctx.fillStyle = '#f0a500';
      ctx.font = `900 ${s * 0.08}px sans-serif`;
      ctx.fillText('IMPOSSIPOINTS', s / 2, s * 0.8);
    }
    drawIcon(document.getElementById('c192'));
    drawIcon(document.getElementById('c512'));
  </script>
</body>
</html>
